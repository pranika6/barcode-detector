<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Calamity Collab Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

  <style>
    body, html { height: 100%; margin: 0; font-family: Arial, sans-serif; }
    #mapContainer { position: relative; width: 100%; height: 400px; transition: height 0.3s ease; }
    #map { width: 100%; height: 100%; }
    .fullscreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
    #openMapBtn {
      margin-top: 1rem; padding: 0.6rem 1.2rem;
      background: #00529B; color: #fff; border: none;
      border-radius: 4px; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Community Map</h2>
  <p>See relief camps, shelters, donation points below:</p>
  <div id="mapContainer">
    <div id="map"></div>
  </div>
  <button id="openMapBtn">Open Map</button>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
  // Initialize the map
  const map = L.map('map').setView([11.6643, 78.1460], 10); // Salem, TN

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Example marker
  L.marker([11.6643, 78.1460])
    .addTo(map)
    .bindPopup('Salem, Tamil Nadu')
    .openPopup(); // Basic Leaflet setup :contentReference[oaicite:1]{index=1}

  // Map expansion logic
  const mapContainer = document.getElementById('mapContainer');
  const openMapBtn = document.getElementById('openMapBtn');

  let isFullscreen = false;
  openMapBtn.addEventListener('click', () => {
    isFullscreen = !isFullscreen;
    if (isFullscreen) {
      mapContainer.classList.add('fullscreen');
      openMapBtn.textContent = 'Close Map';
    } else {
      mapContainer.classList.remove('fullscreen');
      openMapBtn.textContent = 'Open Map';
    }
    setTimeout(() => {
      map.invalidateSize(); // Resize after container changed
    }, 300);
  });
</script>

</body>
</html>
